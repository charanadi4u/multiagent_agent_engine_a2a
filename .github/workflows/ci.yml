name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: image-scoring-adk-a2a

jobs:
  validate:
    name: Validate Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile source
        run: |
          python -m compileall image_scoring_adk_a2a_server testclient deploy

      - name: Run tests when present
        run: |
          if find . -path "./.venv" -prune -o -name "test*.py" -print -quit | grep -q .; then
            python -m pytest
          else
            echo "No pytest test files found; skipping tests."
          fi

  docker:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tags
        id: meta
        shell: bash
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER}/${IMAGE_NAME}"
          echo "image=${IMAGE,,}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${IMAGE,,}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${IMAGE,,}:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'master')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: ${{ github.event_name == 'pull_request' || (github.ref_name != 'main' && github.ref_name != 'master') }}
          push: ${{ github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'master') }}
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-agent-engine:
    name: Deploy to Agent Engine
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master'))
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
      GOOGLE_CLOUD_LOCATION: ${{ secrets.GOOGLE_CLOUD_LOCATION || 'us-central1' }}
      GOOGLE_CLOUD_STORAGE_BUCKET: ${{ secrets.GOOGLE_CLOUD_STORAGE_BUCKET }}
      GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Google Cloud deployment configuration
        id: gcp-config
        shell: bash
        run: |
          STORAGE_BUCKET="${GOOGLE_CLOUD_STORAGE_BUCKET:-$GCS_BUCKET_NAME}"
          if [[ -n "$GCP_PROJECT_ID" && -n "$GCP_SA_KEY" && -n "$STORAGE_BUCKET" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "auth_mode=service_account_key" >> "$GITHUB_OUTPUT"
          elif [[ -n "$GCP_PROJECT_ID" && -n "$GCP_WORKLOAD_IDENTITY_PROVIDER" && -n "$GCP_SERVICE_ACCOUNT" && -n "$STORAGE_BUCKET" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "auth_mode=workload_identity" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Agent Engine deploy. Configure GCP_PROJECT_ID, GOOGLE_CLOUD_STORAGE_BUCKET or GCS_BUCKET_NAME, and either GCP_SA_KEY or GCP_WORKLOAD_IDENTITY_PROVIDER plus GCP_SERVICE_ACCOUNT secrets to enable it."
          fi

      - name: Authenticate to Google Cloud with service account key
        if: steps.gcp-config.outputs.auth_mode == 'service_account_key'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Authenticate to Google Cloud with Workload Identity
        if: steps.gcp-config.outputs.auth_mode == 'workload_identity'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        if: steps.gcp-config.outputs.enabled == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        if: steps.gcp-config.outputs.enabled == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        if: steps.gcp-config.outputs.enabled == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Deploy with Vertex AI Agent Engine script
        if: steps.gcp-config.outputs.enabled == 'true'
        run: |
          python deploy/deploy.py
